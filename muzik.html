<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #list { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .song { padding: 10px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; cursor: pointer; }
        .song:hover { background: #282828; }
        #player { background: #000; padding: 20px; text-align: center; border-top: 2px solid #1DB954; }
    </style>
</head>
<body>
    <div id="list">
        <h2 style="color:#1DB954">ttni Music</h2>
        <div id="songs"></div>
    </div>
    <div id="player">
        <p id="now-playing">Şarkı seç...</p>
        <audio id="audio" controls></audio>
        <button onclick="toggleLoop()">Döngü: Kapalı</button>
    </div>

    <script>
        const songs = Array.from({length: 20}, (_, i) => `sarki${i + 1}.mp3`);
        const audio = document.getElementById('audio');
        
        function toggleLoop() {
            audio.loop = !audio.loop;
            event.target.innerText = "Döngü: " + (audio.loop ? "Açık" : "Kapalı");
        }

        songs.forEach(s => {
            let div = document.createElement('div');
            div.className = 'song';
            div.innerHTML = `<span>${s}</span> <span onclick="event.stopPropagation(); alert('Favorilere eklendi!')">♥</span>`;
            div.onclick = () => {
                document.getElementById('now-playing').innerText = "Çalıyor: " + s;
                audio.src = s;
                audio.play();
            };
            document.getElementById('songs').appendChild(div);
        });
    </script>
</body>
</html>
